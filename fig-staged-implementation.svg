<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
<style>
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .stage rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .stage .th { fill: #085041; }
  .stage .ts { fill: #0F6E56; }
  .gate rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .gate .th { fill: #633806; }
  .gate .ts { fill: #854F0B; }
  .fail rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
  .fail .ts { fill: #791F1F; }
  .neutral rect { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
  .neutral .ts { fill: #5F5E5A; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Stage 1 -->
<g class="stage">
  <rect x="40" y="30" width="360" height="56" rx="8"/>
  <text class="th" x="220" y="48" text-anchor="middle" dominant-baseline="central">Stage 1: Weighted preferences</text>
  <text class="ts" x="220" y="66" text-anchor="middle" dominant-baseline="central">Minimal engineering investment</text>
</g>
<g class="neutral">
  <rect x="430" y="30" width="210" height="56" rx="8"/>
  <text class="ts" x="535" y="48" text-anchor="middle" dominant-baseline="central">Consumes: distribution</text>
  <text class="ts" x="535" y="66" text-anchor="middle" dominant-baseline="central">~5% of RAO</text>
</g>
<line x1="400" y1="58" x2="428" y2="58" class="arr" marker-end="url(#arrow)"/>
<line x1="220" y1="86" x2="220" y2="116" class="arr" marker-end="url(#arrow)"/>

<!-- Gate 1 -->
<g class="gate">
  <rect x="60" y="118" width="320" height="56" rx="8"/>
  <text class="th" x="220" y="136" text-anchor="middle" dominant-baseline="central">Gate: Does it change behaviour?</text>
  <text class="ts" x="220" y="154" text-anchor="middle" dominant-baseline="central">Any measurable calibration difference?</text>
</g>
<line x1="380" y1="146" x2="440" y2="146" class="arr" marker-end="url(#arrow)"/>
<g class="fail">
  <rect x="442" y="126" width="196" height="40" rx="8"/>
  <text class="ts" x="540" y="146" text-anchor="middle" dominant-baseline="central">Null result: diagnosis ambiguous</text>
</g>
<line x1="220" y1="174" x2="220" y2="212" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="232" y="196" dominant-baseline="central">Yes</text>

<!-- Stage 2 -->
<g class="stage">
  <rect x="40" y="214" width="360" height="56" rx="8"/>
  <text class="th" x="220" y="232" text-anchor="middle" dominant-baseline="central">Stage 2: Dual-signal training</text>
  <text class="ts" x="220" y="250" text-anchor="middle" dominant-baseline="central">Curriculum changes, no new architecture</text>
</g>
<g class="neutral">
  <rect x="430" y="214" width="210" height="56" rx="8"/>
  <text class="ts" x="535" y="232" text-anchor="middle" dominant-baseline="central">Consumes: + consensus</text>
  <text class="ts" x="535" y="250" text-anchor="middle" dominant-baseline="central">difficulty threshold</text>
</g>
<line x1="400" y1="242" x2="428" y2="242" class="arr" marker-end="url(#arrow)"/>
<line x1="220" y1="270" x2="220" y2="300" class="arr" marker-end="url(#arrow)"/>

<!-- Gate 2 -->
<g class="gate">
  <rect x="60" y="302" width="320" height="56" rx="8"/>
  <text class="th" x="220" y="320" text-anchor="middle" dominant-baseline="central">Gate: Calibration without accuracy cost?</text>
  <text class="ts" x="220" y="338" text-anchor="middle" dominant-baseline="central">Both metrics must hold</text>
</g>
<line x1="380" y1="330" x2="440" y2="330" class="arr" marker-end="url(#arrow)"/>
<g class="fail">
  <rect x="442" y="310" width="196" height="40" rx="8"/>
  <text class="ts" x="540" y="330" text-anchor="middle" dominant-baseline="central">Adjust threshold or loss weight</text>
</g>
<line x1="220" y1="358" x2="220" y2="396" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="232" y="380" dominant-baseline="central">Yes</text>

<!-- Stage 3 -->
<g class="stage">
  <rect x="40" y="398" width="360" height="56" rx="8"/>
  <text class="th" x="220" y="416" text-anchor="middle" dominant-baseline="central">Stage 3: Multi-headed reward model</text>
  <text class="ts" x="220" y="434" text-anchor="middle" dominant-baseline="central">Architectural changes required</text>
</g>
<g class="neutral">
  <rect x="430" y="390" width="210" height="72" rx="8"/>
  <text class="ts" x="535" y="410" text-anchor="middle" dominant-baseline="central">Consumes: + reasoning</text>
  <text class="ts" x="535" y="426" text-anchor="middle" dominant-baseline="central">axes, peer reviews,</text>
  <text class="ts" x="535" y="442" text-anchor="middle" dominant-baseline="central">secondary axes</text>
</g>
<line x1="400" y1="426" x2="428" y2="426" class="arr" marker-end="url(#arrow)"/>
<line x1="220" y1="454" x2="220" y2="484" class="arr" marker-end="url(#arrow)"/>

<!-- Gate 3 -->
<g class="gate">
  <rect x="60" y="486" width="320" height="56" rx="8"/>
  <text class="th" x="220" y="504" text-anchor="middle" dominant-baseline="central">Gate: Specific uncertainty?</text>
  <text class="ts" x="220" y="522" text-anchor="middle" dominant-baseline="central">Not generic hedging but axis-aware</text>
</g>
<line x1="380" y1="514" x2="440" y2="514" class="arr" marker-end="url(#arrow)"/>
<g class="fail">
  <rect x="442" y="494" width="196" height="40" rx="8"/>
  <text class="ts" x="540" y="514" text-anchor="middle" dominant-baseline="central">Diagnostic for RL mismatch (§3.1)</text>
</g>
</svg>