<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
<style>
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .phase-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .phase-teal .th { fill: #085041; }
  .phase-teal .ts { fill: #0F6E56; }
  .phase-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .phase-purple .th { fill: #3C3489; }
  .phase-purple .ts { fill: #534AB7; }
  .phase-coral rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .phase-coral .th { fill: #712B13; }
  .phase-coral .ts { fill: #993C1D; }
  .phase-amber rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .phase-amber .th { fill: #633806; }
  .phase-amber .ts { fill: #854F0B; }
  .neutral rect { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
  .neutral .ts { fill: #5F5E5A; }
  marker path { stroke: #888780; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase 1 -->
<g class="phase-teal">
  <rect x="40" y="40" width="280" height="56" rx="8"/>
  <text class="th" x="180" y="58" text-anchor="middle" dominant-baseline="central">Phase 1: Independent annotation</text>
  <text class="ts" x="180" y="76" text-anchor="middle" dominant-baseline="central">No visibility into others</text>
</g>
<g class="neutral">
  <rect x="370" y="24" width="270" height="88" rx="8"/>
  <text class="ts" x="505" y="42" text-anchor="middle" dominant-baseline="central">Preference rating</text>
  <text class="ts" x="505" y="58" text-anchor="middle" dominant-baseline="central">Primary + secondary reasoning axes</text>
  <text class="ts" x="505" y="74" text-anchor="middle" dominant-baseline="central">Self-confidence score</text>
  <text class="ts" x="505" y="90" text-anchor="middle" dominant-baseline="central">Justification + improvement notes</text>
</g>
<line x1="320" y1="68" x2="368" y2="68" class="arr" marker-end="url(#arrow)"/>
<line x1="180" y1="96" x2="180" y2="140" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 2 -->
<g class="phase-purple">
  <rect x="40" y="142" width="280" height="56" rx="8"/>
  <text class="th" x="180" y="160" text-anchor="middle" dominant-baseline="central">Phase 2: Cross-review</text>
  <text class="ts" x="180" y="178" text-anchor="middle" dominant-baseline="central">Motivated agreement required</text>
</g>
<g class="neutral">
  <rect x="370" y="130" width="270" height="80" rx="8"/>
  <text class="ts" x="505" y="148" text-anchor="middle" dominant-baseline="central">Reasoning agreement per peer</text>
  <text class="ts" x="505" y="164" text-anchor="middle" dominant-baseline="central">Verdict agreement per peer</text>
  <text class="ts" x="505" y="180" text-anchor="middle" dominant-baseline="central">Written reasoning for each review</text>
  <text class="ts" x="505" y="196" text-anchor="middle" dominant-baseline="central">Optional review confidence</text>
</g>
<line x1="320" y1="170" x2="368" y2="170" class="arr" marker-end="url(#arrow)"/>
<line x1="180" y1="198" x2="180" y2="242" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 3 -->
<g class="phase-coral">
  <rect x="40" y="244" width="280" height="56" rx="8"/>
  <text class="th" x="180" y="262" text-anchor="middle" dominant-baseline="central">Phase 3: Metadata assembly</text>
  <text class="ts" x="180" y="280" text-anchor="middle" dominant-baseline="central">Primarily automated</text>
</g>
<g class="neutral">
  <rect x="370" y="236" width="270" height="72" rx="8"/>
  <text class="ts" x="505" y="254" text-anchor="middle" dominant-baseline="central">Distribution computed</text>
  <text class="ts" x="505" y="270" text-anchor="middle" dominant-baseline="central">Disagreement structure assembled</text>
  <text class="ts" x="505" y="286" text-anchor="middle" dominant-baseline="central">Hybrid classification where needed</text>
</g>
<line x1="320" y1="272" x2="368" y2="272" class="arr" marker-end="url(#arrow)"/>
<line x1="180" y1="300" x2="180" y2="344" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 4 -->
<g class="phase-amber">
  <rect x="40" y="346" width="600" height="56" rx="8"/>
  <text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">Phase 4: Rich Annotation Object</text>
  <text class="ts" x="340" y="382" text-anchor="middle" dominant-baseline="central">Full distribution + reasoning + cross-review + disagreement structure</text>
</g>

<!-- Downstream -->
<line x1="140" y1="402" x2="140" y2="460" class="arr" marker-end="url(#arrow)"/>
<line x1="280" y1="402" x2="280" y2="460" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="402" x2="420" y2="460" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="402" x2="540" y2="460" class="arr" marker-end="url(#arrow)"/>
<g class="neutral">
  <rect x="80" y="462" width="120" height="36" rx="8"/>
  <text class="ts" x="140" y="480" text-anchor="middle" dominant-baseline="central">RLHF / DPO</text>
</g>
<g class="neutral">
  <rect x="220" y="462" width="120" height="36" rx="8"/>
  <text class="ts" x="280" y="480" text-anchor="middle" dominant-baseline="central">SFT</text>
</g>
<g class="neutral">
  <rect x="360" y="462" width="120" height="36" rx="8"/>
  <text class="ts" x="420" y="480" text-anchor="middle" dominant-baseline="central">Constitutional AI</text>
</g>
<g class="neutral">
  <rect x="500" y="462" width="120" height="36" rx="8"/>
  <text class="ts" x="560" y="480" text-anchor="middle" dominant-baseline="central">Future methods</text>
</g>
</svg>